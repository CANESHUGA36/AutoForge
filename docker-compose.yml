services:
  autoforge:
    # Use the latest image with all fixes (browser leak, dev server cleanup, etc.)
    image: autoforge:v8
    # Loads OPENAI_API_KEY, OPENAI_BASE_URL, HARNESS_MODEL, etc. from .env file
    env_file: .env
    environment:
      # Auto-generated workspaces go under this path (must match the volume mount target).
      HARNESS_PROJECTS_DIR: /projects
      # Feature group validation layers (Reviewer autonomously decides when to use them)
      CONTRACT_TEST_ENABLED: "true"
      REACT_DEVTOOLS_ENABLED: "true"
    volumes:
      # Host ./projects  <->  Container /projects
      # All generated apps appear in ./projects/ on your Windows machine.
      - ./projects:/projects
      # Prompts & skills mounted live so edits take effect without rebuilding the image
      - ./prompts:/app/prompts:ro
      - ./skills:/app/skills:ro
      - ./harness:/app/harness:ro
      - ./tools:/app/tools:ro
      - ./config.py:/app/config.py:ro
      - ./agents.py:/app/agents.py:ro
      - ./context.py:/app/context.py:ro
      - ./tools_impl.py:/app/tools_impl.py:ro
      - ./prompts.py:/app/prompts.py:ro
      - ./docs:/app/docs:ro
    # Keep container alive and prevent auto-exit
    tty: true
    stdin_open: true
    # Default command - override with: docker compose run autoforge python run.py "your prompt"
    command: ["python", "run.py"]
