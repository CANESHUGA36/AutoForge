        - generic [ref=e60]:
          - paragraph [ref=e61]: Aiden Vale, a seemingly ordinary seventeen-year-old, never suspected that the dreams plaguing his sleepless nights were in fact echoes of another world bleeding into his own. When he receives an invitation to Starshade Academy, a prestigious institution hidden in plain sight within the Twilight District, his life takes an irrevocable turn.
          - paragraph [ref=e62]: "Within these hallowed halls, Aiden discovers that reality itself is split between two intertwined dimensions: the Waking World he has always known, and the Twilight Realm, a shadowed reflection where ancient powers stir. Students like himself possess the rare gift to traverse both worlds, wielding the mystical energy known as Eclipse Force."
          - paragraph [ref=e63]: Yet peace is fleeting. A malevolent entity known only as The Umbral Sovereign seeks to shatter the barrier between worlds, consuming both realities in eternal darkness. As the midnight hour approaches and the next great eclipse looms on the horizon, Aiden must forge alliances with unlikely companions, master his burgeoning powers, and uncover the truth about his own mysterious origins—before the world he knows is forever consumed by shadow.
          - paragraph [ref=e64]: Duality defines us. What we choose in the twilight hours shapes who we become when the sun rises...
