            - heading "Starshade Academy" [level=3] [ref=e158]
            - paragraph [ref=e159]: Hidden within the Twilight District, Starshade Academy serves as both a prestigious educational institution and a training ground for those who wield Eclipse Force. Its grand halls echo with centuries of accumulated wisdom, while secret passages lead to training arenas where students master combat techniques. The academy's protective wards keep the shadow creatures at bay, creating a sanctuary of knowledge in a world threatened by darkness.
          - generic [ref=e160]:
            - generic [ref=e161]: 🌀
            - heading "The Void" [level=3] [ref=e162]
            - paragraph [ref=e163]: A terrifying dimension that exists parallel to our world, The Void is where the Umbral Sovereign and his legions of shadow creatures dwell. Traversing this realm is necessary for those seeking ultimate power, but the psychic strain and constant threat of corruption make expeditions incredibly dangerous. Ancient ruins and forgotten civilizations lie scattered throughout this endless twilight, remnants of those who dared to challenge the darkness and fell.
          - generic [ref=e164]:
            - generic [ref=e165]: 🌃
            - heading "Twilight District" [level=3] [ref=e166]
            - paragraph [ref=e167]: The bustling urban heart where the Waking World and Twilight Realm intersect most prominently, the Twilight District never truly sleeps. Neon lights mix with mystical auroras as citizens go about their lives, often unaware of the magical currents flowing beneath their feet. Street markets sell both ordinary goods and enchanted artifacts, while hidden clubs serve as meeting points for Eclipse Force practitioners. Here, the boundaries between worlds blur with every sunset.
          - generic [ref=e168]:
            - generic [ref=e169]: 🗼
            - heading "The Tower" [level=3] [ref=e170]
            - paragraph [ref=e171]: Rising impossibly high above the surrounding landscape, The Tower is the nexus point where all Eclipse Force energy converges. Ancient builders constructed this monument eons ago, though no records survive of their civilization. At its peak lies a portal to the deepest reaches of The Void, guarded by trials that test the very soul of any who seek passage. Only those deemed worthy by The Tower itself may ascend its endless staircases.
