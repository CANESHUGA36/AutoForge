            - paragraph [ref=e208]: Unleash spectacular finishing moves with your entire party.
            - paragraph [ref=e209]: When the situation reaches its peak, gather your entire party for an All-Out Attack—the most spectacular technique in your arsenal. All party members converge on a single target in a dazzling display of coordinated power, each contributing their unique abilities to create a cinematic finishing move that exceeds the sum of its parts. These moments define the heat of battle, turning seemingly impossible encounters into triumphant victories. The thrill of executing a perfectly timed All-Out Attack remains unmatched, delivering satisfaction that keeps players hungry for more.
