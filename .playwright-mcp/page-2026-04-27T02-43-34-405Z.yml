          - heading "50+ Hours Story" [level=3] [ref=e237]
          - paragraph [ref=e238]: Immerse yourself in an epic narrative spanning over fifty hours of main story content. Multiple endings, branching paths, and hidden subplots ensure every playthrough reveals new secrets. Your choices genuinely matter and shape the fate of both worlds.
