            - paragraph [ref=e188]: Master strategic combat with timed actions and party coordination.
            - paragraph [ref=e189]: Experience the depth of tactical turn-based combat where every decision matters. Command your party of allies, exploit enemy weaknesses, and time your abilities for maximum impact. The innovative All-Out Attack system rewards clever thinking with devastating combination moves that can turn the tide of battle in an instant. Plan your strategy, read enemy patterns, and execute perfectly timed counterattacks to emerge victorious against even the most formidable foes.
