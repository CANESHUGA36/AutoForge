            - paragraph [ref=e198]: Combine abilities through character fusion for overwhelming power.
            - paragraph [ref=e199]: Harness the mystical Fusion System to unlock devastating combination techniques. When allies synchronize their Eclipse Force, they can perform spectacular fusion attacks that combine their unique abilities into catastrophic power. Chain basic attacks into powerful skills, then trigger climactic All-Out Attacks that devastate entire enemy formations. The fusion meter builds with each well-timed action, offering players the thrill of explosive payoffs for skilled play. Master the timing and watch your enemies crumble before your combined might.
